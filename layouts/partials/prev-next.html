{{- $prev := .NextInSection -}}
{{- $next := .PrevInSection -}}
{{- if or $prev $next -}}
<nav class="not-prose mt-12 flex items-center justify-between gap-4 border-t border-gray-200 pt-6 dark:border-gray-800">
  {{ if $prev }}
  <a href="{{ $prev.RelPermalink }}" class="group flex flex-1 items-center gap-3 rounded-lg border border-gray-200 px-4 py-3 transition hover:border-blue-500 hover:bg-blue-50 dark:border-gray-800 dark:hover:border-blue-600 dark:hover:bg-blue-950/30 min-w-0">
    <svg class="h-5 w-5 flex-shrink-0 text-gray-400 group-hover:text-blue-600 dark:group-hover:text-blue-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" /></svg>
    <div class="min-w-0 flex-1">
      <div class="text-xs text-gray-500 dark:text-gray-400">Previous</div>
      <div class="truncate text-sm font-medium text-gray-900 dark:text-gray-100">{{ $prev.LinkTitle }}</div>
    </div>
  </a>
  {{ else }}
  <div class="flex-1"></div>
  {{ end }}
  {{ if $next }}
  <a href="{{ $next.RelPermalink }}" class="group flex flex-1 items-center justify-end gap-3 rounded-lg border border-gray-200 px-4 py-3 transition hover:border-blue-500 hover:bg-blue-50 dark:border-gray-800 dark:hover:border-blue-600 dark:hover:bg-blue-950/30 min-w-0">
    <div class="min-w-0 flex-1 text-right">
      <div class="text-xs text-gray-500 dark:text-gray-400">Next</div>
      <div class="truncate text-sm font-medium text-gray-900 dark:text-gray-100">{{ $next.LinkTitle }}</div>
    </div>
    <svg class="h-5 w-5 flex-shrink-0 text-gray-400 group-hover:text-blue-600 dark:group-hover:text-blue-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" /></svg>
  </a>
  {{ else }}
  <div class="flex-1"></div>
  {{ end }}
</nav>
{{- end -}}
