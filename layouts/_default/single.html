{{ define "main" }}
{{ partial "breadcrumb.html" . }}

<div class="flex gap-8 mt-6">
  <article class="prose prose-lg dark:prose-invert max-w-none flex-1 min-w-0">
    <h1 class="text-3xl font-bold text-gray-900 dark:text-gray-100 mb-6">{{ .Title }}</h1>
    <div class="text-gray-700 dark:text-gray-300 text-base">{{ .Content }}</div>
  </article>
  {{ partial "toc.html" . }}
</div>
{{ end }}
