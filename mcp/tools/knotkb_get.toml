description = "Read a page of Knot's documentation (guides and technical reference). If the path is a folder or ends with /index.md, a directory listing is synthesized on the fly. Use knotkb_list first to find a path."
keywords = ["knot", "documentation", "docs", "get", "read", "file", "page", "fetch"]

[[parameters]]
name = "path"
type = "string"
description = "Path relative to the OKF root. A page (e.g. 'knot-reference/cli.md'), a folder (e.g. 'knot-docs/configuration'), '<folder>/index.md' for a synthesized listing, or empty for the root bundle list."
