description = "Exact keyword search across Knot's documentation (guides and technical reference): matches any of the terms (OR, case-insensitive) in page names, frontmatter, and bodies. Use when you know exact terms or identifiers (command or field names); use knotkb_search for natural-language or conceptual queries."
keywords = ["knot", "documentation", "docs", "grep", "exact", "keyword", "find", "match", "identifier"]

[[parameters]]
name = "path"
type = "string"
description = "Scope: a bundle or folder path (e.g. 'knot-reference', 'knot-reference/cli'). Empty searches all bundles."

[[parameters]]
name = "terms"
type = "array:string"
description = "Terms to match (OR semantics, case-insensitive)."
required = true
